<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Cap Fund – Congressional District Map</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <header id="header">
      <div id="logo">
        <span class="logo-mark">●</span> No Cap Fund
      </div>
      <div id="search-container">
        <input
          type="text"
          id="search-input"
          placeholder="Enter zip code or address to find your district…"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="search-btn">Find My District</button>
      </div>
      <button id="clear-btn" class="hidden">Clear Selection</button>
    </header>

    <div id="map"></div>

    <aside id="panel" class="hidden">
      <button id="panel-close">×</button>
      <div id="panel-content"></div>
    </aside>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <span>Loading districts…</span>
    </div>

    <div id="tooltip"></div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
